[pytest]
# pytest 설정 파일 - Marketing Bot Backend
# [Phase 2] 테스트 인프라 개선

# 테스트 디렉토리
testpaths = tests

# Python 파일 검색 패턴
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 기본 옵션
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --cov=routers
    --cov=services
    --cov-report=term-missing
    --cov-report=html:coverage_report
    --cov-fail-under=30

# 마커 정의
markers =
    slow: 느린 테스트 (외부 API 호출 등)
    integration: 통합 테스트
    unit: 단위 테스트
    api: API 엔드포인트 테스트
    migration: 마이그레이션 테스트

# 로깅 설정
log_cli = false
log_cli_level = INFO

# 경고 필터링
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 타임아웃 (초)
timeout = 30

# asyncio 모드 (pytest-asyncio)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 병렬 실행 시 워커 수 (pytest-xdist 사용 시)
# addopts = -n auto
