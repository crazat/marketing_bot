version: '3.8'

# 프로덕션 환경 오버라이드
services:
  backend:
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=production
    restart: unless-stopped
    command: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped

  nginx:
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
