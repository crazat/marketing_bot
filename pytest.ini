[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# Show extra info
addopts = -v --tb=short

# [T1] pytest-asyncio: 함수별 명시적 @pytest.mark.asyncio 필요
asyncio_mode = strict

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may use DB/API)
    slow: Slow tests (external services)
    asyncio: async test

# Timeout for each test (optional, requires pytest-timeout)
# timeout = 30

# Ignore specific directories
norecursedirs = 
    __pycache__
    .git
    _archive
    venv
    data
