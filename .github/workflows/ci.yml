name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-syntax:
    name: Backend Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Python syntax check (all .py)
        run: |
          python - <<'PY'
          import ast, pathlib, sys
          failed = []
          scanned = 0
          for p in pathlib.Path('.').rglob('*.py'):
              s = str(p)
              if any(x in s for x in ('venv', '.venv', 'node_modules', 'site-packages', '_archive')):
                  continue
              scanned += 1
              try:
                  ast.parse(p.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  failed.append(f"{p}: {e}")
          if failed:
              print('\n'.join(failed))
              sys.exit(1)
          print(f"Python syntax OK: {scanned} files scanned")
          PY

  backend-tests:
    name: Backend Repository/Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx fastapi pydantic
          pip install -r marketing_bot_web/backend/requirements.txt || true

      - name: Run Repository tests
        run: |
          pytest tests/test_viral_target_repo.py \
                 tests/test_lead_repo.py \
                 tests/test_competitor_repo.py \
                 tests/test_keyword_repo.py \
                 -v --tb=short

      - name: Run Service layer tests
        run: |
          pytest tests/test_viral_service.py \
                 tests/test_lead_service.py \
                 tests/test_hud_service.py \
                 -v --tb=short

      - name: Run router smoke + e2e tests
        env:
          DISABLE_API_AUTH: "true"
          MARKETING_BOT_API_KEY: "ci-test-key"
        run: |
          pytest tests/test_router_smoke.py \
                 tests/test_viral_utm_e2e.py \
                 -v --tb=short

      - name: Import smoke (all routers)
        env:
          DISABLE_API_AUTH: "true"
          MARKETING_BOT_API_KEY: "ci-test-key"
        run: |
          cd marketing_bot_web/backend
          python -c "from routers.viral import router; print('viral:', len(router.routes))"
          python -c "from routers.viral_utm import router; print('viral_utm:', len(router.routes))"
          python -c "from routers.viral_templates import router; print('viral_templates:', len(router.routes))"
          python -c "from routers.viral_comments import router; print('viral_comments:', len(router.routes))"

  frontend-build:
    name: Frontend Build + Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketing_bot_web/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: marketing_bot_web/frontend/package-lock.json

      - run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Lint (non-blocking)
        run: npm run lint || true

      - name: Production build
        run: npm run build
